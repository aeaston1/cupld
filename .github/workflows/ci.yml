name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: cargo test and memory evals
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust 1.95
        shell: bash
        run: |
          rustup toolchain install 1.95 --profile minimal
          rustup default 1.95

      - name: Cargo test
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo test --locked

      - name: Default memory evals
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo run --locked -- eval memory --ci
